<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGEF-SJB - Gestion des élèves</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

header{
    background:#0b4f6c;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

form{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

input,select,button{
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#0b4f6c;
    color:white;
    cursor:pointer;
    border:none;
}

button:hover{
    background:#16324f;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#16324f;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.annee{
    background:#e8f1f5;
    padding:10px;
    font-weight:bold;
    color:#0b4f6c;
}

.retour{
    text-decoration:none;
    color:#0b4f6c;
    font-weight:bold;
}

</style>

</head>


<body>


<header>

<h1>École Saint Jean Baptiste</h1>

<p>SIGEF-SJB - Gestion des élèves</p>

</header>


<div class="container">


<div class="card">

<div class="annee" id="anneeActive">
Année scolaire : chargement...
</div>

</div>



<div class="card">

<h2>Ajouter un élève</h2>


<form>


<input id="matricule" placeholder="Matricule">

<input id="nom" placeholder="Nom">

<input id="prenom" placeholder="Prénom">


<select id="sexe">

<option value="">Sexe</option>
<option>Masculin</option>
<option>Féminin</option>

</select>


<input type="date" id="dateNaissance">



<select id="niveau">

<option value="">Niveau</option>
<option>Maternelle</option>
<option>Primaire</option>

</select>



<select id="classe">

<option value="">Classe</option>

<option>Crèche</option>
<option>Petite Section (PS)</option>
<option>Moyenne Section (MS)</option>
<option>Grande Section (GS)</option>

<option>CP1</option>
<option>CP2</option>
<option>CE1</option>
<option>CE2</option>
<option>CM1</option>
<option>CM2</option>

</select>



<input id="parent" placeholder="Parent / Tuteur">

<input id="telephone" placeholder="Téléphone">


<button type="button" id="btnEleve">
Enregistrer l'élève
</button>


</form>

</div>




<div class="card">


<h2>Liste des élèves</h2>


<table id="tableEleves">


<tr>

<th>Matricule</th>
<th>Nom</th>
<th>Prénom</th>
<th>Classe</th>
<th>Année</th>
<th>Parent</th>
<th>Téléphone</th>

</tr>


</table>


</div>



<a class="retour" href="index.html">

⬅ Retour au tableau de bord

</a>


</div>




<script>


let anneeActive = localStorage.getItem("anneeActiveSJB");


if(anneeActive){

document.getElementById("anneeActive").innerHTML =
"Année scolaire active : " + anneeActive;

}




function chargerEleves(){


let eleves =
JSON.parse(localStorage.getItem("elevesSJB")) || [];


let table=document.getElementById("tableEleves");


eleves.forEach(function(eleve){


let ligne=table.insertRow(-1);


ligne.insertCell(0).innerHTML=eleve.matricule;
ligne.insertCell(1).innerHTML=eleve.nom;
ligne.insertCell(2).innerHTML=eleve.prenom;
ligne.insertCell(3).innerHTML=eleve.classe;
ligne.insertCell(4).innerHTML=eleve.annee;
ligne.insertCell(5).innerHTML=eleve.parent;
ligne.insertCell(6).innerHTML=eleve.telephone;


});


}



chargerEleves();





document.getElementById("btnEleve").addEventListener("click",function(){


let eleve={


matricule:document.getElementById("matricule").value,

nom:document.getElementById("nom").value,

prenom:document.getElementById("prenom").value,

sexe:document.getElementById("sexe").value,

dateNaissance:document.getElementById("dateNaissance").value,

niveau:document.getElementById("niveau").value,

classe:document.getElementById("classe").value,

parent:document.getElementById("parent").value,

telephone:document.getElementById("telephone").value,

annee:anneeActive


};



if(eleve.nom==="" || eleve.prenom==="" || eleve.classe===""){

alert("Veuillez renseigner le nom, le prénom et la classe.");

return;

}



let eleves=
JSON.parse(localStorage.getItem("elevesSJB")) || [];


eleves.push(eleve);


localStorage.setItem("elevesSJB",JSON.stringify(eleves));



alert("Élève enregistré avec succès !");


location.reload();


});



</script>


</body>

</html>
