<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGEF-SJB - Gestion des élèves</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

header{
    background:#0b4f6c;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#0b4f6c;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#16324f;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.retour{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#0b4f6c;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>École Saint Jean Baptiste</h1>
<p>SIGEF-SJB - Gestion des élèves</p>
</header>

<div class="container">

<div class="card">
<h2>Ajouter un élève</h2>

<form>
<input type="text" placeholder="Matricule">
<input type="text" placeholder="Nom">
<input type="text" placeholder="Prénom">

<select>
<option>Sexe</option>
<option>Masculin</option>
<option>Féminin</option>
</select>

<input type="date">

<select>
<option>Classe</option>
<option>Crèche</option>
<option>Maternelle</option>
<option>CP1</option>
<option>CP2</option>
<option>CE1</option>
<option>CE2</option>
<option>CM1</option>
<option>CM2</option>
</select>

<input type="text" placeholder="Nom du parent / tuteur">
<input type="tel" placeholder="Téléphone">

<button type="button">Enregistrer l'élève</button>
</form>
</div>

<div class="card">
<h2>Liste des élèves</h2>

<table>
<tr>
<th>Matricule</th>
<th>Nom</th>
<th>Prénom</th>
<th>Classe</th>
<th>Parent</th>
<th>Téléphone</th>
</tr>

<tr>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>

</table>
</div>

<a class="retour" href="index.html">
⬅ Retour au tableau de bord
</a>

</div>

</body>
</html>
