<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGEF-SJB - Gestion des élèves</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}


header{
    background:#0b4f6c;
    color:white;
    padding:20px;
    text-align:center;
}


header h1{
    margin:0;
}


.container{
    padding:30px;
}


.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}


form{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}


input, select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}


button{
    background:#0b4f6c;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
    cursor:pointer;
}


button:hover{
    background:#16324f;
}


table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}


th{
    background:#16324f;
    color:white;
    padding:12px;
}


td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}


.retour{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#0b4f6c;
    font-weight:bold;
}


</style>

</head>


<body>


<header>

<h1>École Saint Jean Baptiste</h1>

<p>SIGEF-SJB - Gestion des élèves</p>

</header>



<div class="container">



<div class="card">


<h2>Ajouter un élève</h2>


<form>


<input type="text" id="matricule" placeholder="Matricule">


<input type="text" id="nom" placeholder="Nom">


<input type="text" id="prenom" placeholder="Prénom">



<select id="sexe">

<option value="">Choisir le sexe</option>

<option>Masculin</option>

<option>Féminin</option>

</select>



<input type="date" id="dateNaissance">



<select id="niveau">

<option value="">Choisir le niveau</option>

<option>Maternelle</option>

<option>Primaire</option>

</select>


<select id="classe">


<option value="">Choisir la classe</option>


<option disabled>--- MATERNELLE ---</option>

<option>Crèche</option>

<option>Petite Section (PS)</option>

<option>Moyenne Section (MS)</option>

<option>Grande Section (GS)</option>



<option disabled>--- PRIMAIRE ---</option>

<option>CP1</option>

<option>CP2</option>

<option>CE1</option>

<option>CE2</option>

<option>CM1</option>

<option>CM2</option>


</select>


<input type="text" id="parent" placeholder="Nom du parent / tuteur">


<input type="tel" id="telephone" placeholder="Téléphone">


<button type="button" id="btnEleve">

Enregistrer l'élève

</button>


</form>


</div>
<div class="card">

<h2>Liste des élèves</h2>


<table id="tableEleves">


<tr>

<th>Matricule</th>

<th>Nom</th>

<th>Prénom</th>

<th>Sexe</th>

<th>Niveau</th>

<th>Classe</th>

<th>Parent</th>

<th>Téléphone</th>

<th>Action</th>

</tr>


</table>


</div>




<a class="retour" href="index.html">

⬅ Retour au tableau de bord

</a>



</div>
