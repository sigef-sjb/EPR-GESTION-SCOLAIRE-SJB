
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGEF-SJB - Test Année scolaire active</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#0b4f6c;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
    max-width:600px;
    margin:auto;
}

select,button{
    padding:12px;
    margin-top:10px;
    width:100%;
    border-radius:5px;
}

button{
    background:#0b4f6c;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#16324f;
}

.resultat{
    margin-top:20px;
    font-weight:bold;
    color:#0b4f6c;
}

</style>

</head>


<body>


<header>

<h1>École Saint Jean Baptiste</h1>

<p>SIGEF-SJB</p>

</header>



<div class="container">


<div class="card">


<h2>📅 Année scolaire active</h2>


<select id="annee">

<option>2026-2027</option>
<option>2027-2028</option>
<option>2028-2029</option>
<option>2029-2030</option>
<option>2030-2031</option>
<option>2031-2032</option>
<option>2032-2033</option>
<option>2033-2034</option>
<option>2034-2035</option>
<option>2035-2036</option>

</select>


<button onclick="validerAnnee()">

✅ Valider l'année scolaire

</button>


<div class="resultat" id="affichage"></div>


</div>


</div>



<script>


// Charger l'année déjà enregistrée

window.onload=function(){

let annee = localStorage.getItem("anneeActiveSJB");

if(annee){

document.getElementById("affichage").innerHTML =
"Année scolaire active : " + annee;

document.getElementById("annee").value=annee;

}

}




function validerAnnee(){


let annee = document.getElementById("annee").value;


localStorage.setItem("anneeActiveSJB",annee);


document.getElementById("affichage").innerHTML =
"Année scolaire active : " + annee + " ✅";


alert("Année scolaire active enregistrée : " + annee);


}


</script>


</body>

</html>
